<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Move — Ultimate DB</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8; --card: #fffdf8; --ink: #1a1a18; --ink-soft: #5a5a52; --ink-faint: #b0aa9a;
    --core: #c4622d; --core-bg: #fdf0e8;
    --glute: #2d7a4a; --glute-bg: #eaf5ee;
    --arm: #2952a3; --arm-bg: #eaeffa;
    --stretch: #8b45a0; --stretch-bg: #f5eafa;
    --success: #2d7a4a; --timer-ring: #c4622d;
    --shadow: 0 2px 16px rgba(0,0,0,0.07); --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 60px; }

  header { background: var(--ink); color: #fff; padding: 24px 24px 20px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 16px; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; letter-spacing: -0.01em; line-height: 1; margin: 0; }
  header h1 em { font-style: italic; color: #e8c99a; }
  
  .controls-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 10px; flex-wrap: wrap;}
  .week-selector { display: flex; align-items: center; gap: 8px; }
  .week-arrow { background: #333; border: none; color: #fff; font-size: 1rem; cursor: pointer; border-radius: 6px; padding: 4px 10px; transition: background 0.2s; }
  .week-arrow:hover { background: #555; }
  .day-badge { background: #e8c99a; color: var(--ink); border-radius: 8px; padding: 6px 12px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; min-width: 90px; text-align: center; }
  
  .focus-select { background: #333; color: #fff; border: 1px solid #555; border-radius: 8px; padding: 6px 10px; font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: inherit; outline: none; }
  .focus-select:focus { border-color: #e8c99a; }

  /* RPG STATS UI */
  .stats-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat-col { display: flex; flex-direction: column; gap: 4px; }
  .stat-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #b0aa9a; display: flex; justify-content: space-between;}
  .stat-lvl { color: #fff; }
  .stat-bar-bg { width: 100%; height: 6px; background: #333; border-radius: 99px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }
  .fill-core { background: var(--core); }
  .fill-power { background: var(--arm); }
  .fill-mob { background: var(--stretch); }

  .week-row { display: flex; gap: 8px; padding: 16px 24px 0; overflow-x: auto; scrollbar-width: none; }
  .week-row::-webkit-scrollbar { display: none; }
  .day-btn { padding: 10px 14px; border-radius: 12px; border: 1px solid #e8e2d6; background: #fff; color: var(--ink-soft); cursor: pointer; display: flex; flex-direction: column; align-items: center; min-width: 80px; transition: all 0.2s; flex-shrink: 0; }
  .day-btn:hover { background: #fdfaf5; }
  .day-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); transform: translateY(-2px); box-shadow: var(--shadow); }
  .day-name { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
  .day-focus { font-size: 0.65rem; opacity: 0.8; text-align: center; line-height: 1.2;}

  main { padding: 20px 24px; max-width: 680px; margin: 0 auto; }
  .daily-focus-title { font-family: 'DM Serif Display', serif; font-size: 1.5rem; margin-bottom: 4px; color: var(--ink); }
  .phase-subtitle { font-size: 0.85rem; color: var(--ink-soft); font-weight: 600; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.05em; display: flex; justify-content: space-between;}
  .phase-focus { color: var(--core); }

  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; margin-top: 24px; }
  .section-dot { width: 12px; height: 12px; border-radius: 50%; }
  .section-title { font-family: 'DM Serif Display', serif; font-size: 1.3rem; }

  .exercise-card { background: var(--card); border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 12px; overflow: hidden; transition: all 0.2s; border: 1.5px solid transparent; }
  .exercise-card.completed { opacity: 0.6; border-color: var(--success); background: #f9fbf9; }
  
  .card-top { display: flex; align-items: center; padding: 16px 18px; gap: 14px; cursor: pointer; user-select: none; }
  .check-circle { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #d0c9bc; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; background: #fff;}
  .check-circle svg { opacity: 0; transition: opacity 0.2s; }
  .check-circle.checked { background: var(--success); border-color: var(--success); transform: scale(1.1); }
  .check-circle.checked svg { opacity: 1; }

  .card-info { flex: 1; min-width: 0; }
  .exercise-name { font-weight: 600; font-size: 1.05rem; margin-bottom: 6px; }
  .exercise-meta { font-size: 0.8rem; color: var(--ink-soft); display: flex; gap: 8px; flex-wrap: wrap; }
  .meta-tag { display: inline-flex; align-items: center; gap: 4px; background: #f0ebe0; padding: 4px 8px; border-radius: 6px; font-weight: 600;}
  .lvl-indicator { color: var(--core); }
  .xp-tag { color: var(--arm); font-weight: 700; }

  .expand-btn { color: var(--ink-faint); background: none; border: none; cursor: pointer; padding: 4px; transition: transform 0.25s; }
  .expand-btn.open { transform: rotate(180deg); color: var(--ink-soft); }

  .card-detail { display: none; padding: 0 18px 18px; border-top: 1px solid #f0ebe0; }
  .card-detail.open { display: block; }
  .detail-desc { font-size: 0.9rem; color: var(--ink-soft); line-height: 1.6; margin: 12px 0; }

  .action-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .action-btn { background: #ede8de; border: none; padding: 8px 14px; border-radius: 8px; font-size: 0.78rem; font-weight: 600; color: var(--ink); cursor: pointer; transition: background 0.2s; }
  .action-btn:hover { background: #dcd5c7; }

  .timer-wrap { display: flex; align-items: center; gap: 14px; background: #f8f4ee; border-radius: 14px; padding: 14px 18px; margin-top: 14px; }
  .timer-svg-wrap { position: relative; flex-shrink: 0; }
  .timer-svg { width: 64px; height: 64px; transform: rotate(-90deg); }
  .timer-bg { fill: none; stroke: #e0d9ce; stroke-width: 5; }
  .timer-ring { fill: none; stroke: var(--timer-ring); stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .timer-display { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 700; }
  .timer-controls { display: flex; flex-direction: column; gap: 8px; }
  .timer-btns { display: flex; gap: 8px; }
  .timer-btn { padding: 6px 14px; border-radius: 6px; border: none; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
  .timer-btn.start { background: var(--core); color: #fff; }

  .done-banner { background: var(--success); color: #fff; border-radius: 14px; padding: 18px 22px; text-align: center; margin-top: 24px; display: none; animation: popIn 0.4s; }
  @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }

  .footer-actions { text-align: center; margin-top: 40px; }
  .reset-btn { background: none; border: none; color: var(--ink-faint); font-size: 0.75rem; text-decoration: underline; cursor: pointer; transition: color 0.2s; }
  .reset-btn:hover { color: var(--core); }

  .theme-core { --theme-color: var(--core); }
  .theme-glute { --theme-color: var(--glute); }
  .theme-arm { --theme-color: var(--arm); }
  .theme-stretch { --theme-color: var(--stretch); }
  .exercise-card .check-circle.checked { background: var(--theme-color); border-color: var(--theme-color); }
  .exercise-card .timer-ring { stroke: var(--theme-color); }
  .exercise-card .timer-btn.start { background: var(--theme-color); }

  @media (max-width: 480px) { header { padding: 20px 16px 16px; } main { padding: 16px; } }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Daily <em>Move</em></h1>
  </div>
  
  <div class="controls-row">
    <div class="week-selector">
      <button class="week-arrow" id="btnPrevWeek" onclick="changeWeek(-1)">❮</button>
      <span class="day-badge" id="weekBadge">Wk 1 / 24</span>
      <button class="week-arrow" id="btnNextWeek" onclick="changeWeek(1)">❯</button>
    </div>
    <select id="focusSelect" class="focus-select" onchange="changeFocus(this.value)">
      <option value="balanced">Focus: Balanced</option>
      <option value="upper">Focus: Upper Body</option>
      <option value="lower">Focus: Lower Body</option>
      <option value="core">Focus: Core Engine</option>
      <option value="mobility">Focus: Mobility Flow</option>
    </select>
  </div>

  <div class="stats-board">
    <div class="stat-col">
      <div class="stat-label">Core <span class="stat-lvl" id="lvlCore">Lv.1</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fill fill-core" id="barCore"></div></div>
    </div>
    <div class="stat-col">
      <div class="stat-label">Power <span class="stat-lvl" id="lvlPower">Lv.1</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fill fill-power" id="barPower"></div></div>
    </div>
    <div class="stat-col">
      <div class="stat-label">Mobility <span class="stat-lvl" id="lvlMob">Lv.1</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fill fill-mob" id="barMob"></div></div>
    </div>
  </div>
</header>

<div class="week-row" id="weekSchedule"></div>

<main id="mainContent">
  <h2 class="daily-focus-title" id="dailyFocusTitle">Loading...</h2>
  <div class="phase-subtitle" id="phaseSubtitle">
    <span id="phaseName">Phase 1</span>
    <span class="phase-focus" id="phaseFocus">Focus: Base Volume</span>
  </div>
  <div id="workoutContainer"></div>
  
  <div class="done-banner" id="doneBanner">
    <h3 style="font-family:'DM Serif Display'; font-size:1.4rem; margin-bottom:6px;">🎉 Quest Complete!</h3>
    <p style="font-size:0.9rem; opacity:0.9;">XP secured. Rest up your joints and come back tomorrow.</p>
  </div>

  <div class="footer-actions">
    <button class="reset-btn" onclick="hardReset()">Reset All Progress</button>
  </div>
</main>

<script>
  // --- GLOBAL STATE VARIABLES ---
  const STORAGE_KEY = 'dailyMoveSaveData_v5';
  const MAX_WEEKS = 24;
  let currentWeek = 1;
  let currentDayIdx = 0;
  let currentFocus = 'balanced';
  let userOverrides = {}; 
  let completedStats = {};
  const timers = {};
  let activeSchedule = [];

  // --- LOCAL STORAGE ENGINE ---
  function saveGame() {
    const serializedCompleted = {};
    for (let day in completedStats) serializedCompleted[day] = Array.from(completedStats[day]);
    const payload = { currentWeek, currentDayIdx, currentFocus, playerStats, userOverrides, activeSchedule, completedStats: serializedCompleted };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  }

  function loadGame() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const data = JSON.parse(saved);
        currentWeek = data.currentWeek || 1;
        currentDayIdx = data.currentDayIdx || 0;
        currentFocus = data.currentFocus || 'balanced';
        document.getElementById('focusSelect').value = currentFocus;
        playerStats = data.playerStats || { core: {xp:0, lvl:1}, power: {xp:0, lvl:1}, mob: {xp:0, lvl:1} };
        userOverrides = data.userOverrides || {};
        activeSchedule = data.activeSchedule || generateSchedule(currentFocus);
        const loadedStats = data.completedStats || {};
        completedStats = {};
        for(let i=0; i<7; i++) completedStats[i] = new Set(loadedStats[i] || []);
        return true;
      } catch (e) { return false; }
    }
    return false;
  }

  function hardReset() {
    if (confirm("Reset everything? This cannot be undone.")) {
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }
  }

  // --- RPG SYSTEM ---
  const XP_PER_LEVEL = 100;
  let playerStats = { core: { xp: 0, lvl: 1 }, power: { xp: 0, lvl: 1 }, mob: { xp: 0, lvl: 1 } };
  const statMapping = { core: 'core', glute: 'power', arm: 'power', stretch: 'mob' };

  function addXP(category, amount) {
    const statKey = statMapping[category];
    playerStats[statKey].xp += amount;
    if (playerStats[statKey].xp >= XP_PER_LEVEL) {
      playerStats[statKey].lvl++;
      playerStats[statKey].xp -= XP_PER_LEVEL;
    }
    updateStatUI();
  }

  function removeXP(category, amount) {
    const statKey = statMapping[category];
    playerStats[statKey].xp -= amount;
    if (playerStats[statKey].xp < 0 && playerStats[statKey].lvl > 1) {
      playerStats[statKey].lvl--;
      playerStats[statKey].xp += XP_PER_LEVEL;
    } else if (playerStats[statKey].xp < 0) {
      playerStats[statKey].xp = 0;
    }
    updateStatUI();
  }

  function updateStatUI() {
    ['core', 'power', 'mob'].forEach(key => {
      document.getElementById(`lvl${key.charAt(0).toUpperCase() + key.slice(1)}`).textContent = `Lv.${playerStats[key].lvl}`;
      const pct = (playerStats[key].xp / XP_PER_LEVEL) * 100;
      document.getElementById(`bar${key.charAt(0).toUpperCase() + key.slice(1)}`).style.width = `${pct}%`;
    });
  }

  // --- MASSIVE EXERCISE DATABASE (136 Variations) ---
  const db = {
    // === CORE ===
    c_iso: { cat: 'core', theme: 'theme-core', title: 'Core Isometric', type: 'time', vars: [
      { name: 'Full Plank', desc: 'Straight line from head to heels. Push floor away.', base: 15 },
      { name: 'Plank Leg Lifts', desc: 'In plank, alternate lifting one leg 2 inches off floor.', base: 20 },
      { name: 'Spiderman Plank', desc: 'In plank, bring knee to outside of same-side elbow slowly.', base: 20 },
      { name: 'Extended Plank', desc: 'Walk hands 4-6 inches forward past shoulders. Intense tension.', base: 20 }
    ]},
    c_dyn: { cat: 'core', theme: 'theme-core', title: 'Core Dynamic', type: 'reps', vars: [
      { name: 'Heel Taps', desc: 'Lie on back, knees 90°. Tap one heel to floor, return.', base: 10 },
      { name: 'Bicycle Crunches', desc: 'Elbow to opposite knee. Control the twist.', base: 12 },
      { name: 'V-Ups', desc: 'Snap up, touching hands to toes at the top.', base: 8 },
      { name: 'Hollow Rocks', desc: 'Hold hollow body position and gently rock forward/back.', base: 12 }
    ]},
    c_post: { cat: 'core', theme: 'theme-core', title: 'Posterior Core', type: 'reps_side', vars: [
      { name: 'Bird Dog', desc: 'All fours. Extend opposite arm and leg perfectly straight.', base: 6 },
      { name: 'Bird Dog Hover', desc: 'Same motion, but lift planted knee 1 inch off floor.', base: 6 },
      { name: 'Superman Lifts', desc: 'Lie on stomach, lift chest and thighs, pause 1s, lower.', base: 10 },
      { name: 'Reverse Hypers', desc: 'Lie face down on edge of bed/couch. Lift legs straight up to parallel.', base: 10 }
    ]},
    c_pelvic: { cat: 'core', theme: 'theme-core', title: 'Deep Core / Pelvic', type: 'time', vars: [
      { name: 'Diaphragmatic Breathing', desc: 'Lie on back. Inhale deeply. Exhale fully while gently drawing pelvic floor up and in.', base: 30 },
      { name: 'Supine Marching', desc: 'Lie on back. Exhale, engage core, and slowly lift one foot 2 inches off floor.', base: 30 },
      { name: 'Bridge with Kegel Pulse', desc: 'Hold glute bridge at top. On every exhale, pulse a pelvic floor squeeze.', base: 30 },
      { name: 'Bear Hover Breathing', desc: 'On hands and knees. Lift knees 1 inch off floor. Hold and breathe deeply.', base: 20 }
    ]},
    c_oblique: { cat: 'core', theme: 'theme-core', title: 'Lateral Core', type: 'time_side', vars: [
      { name: 'Side Plank', desc: 'Stack feet, lift hips. Straight line from head to heels.', base: 15 },
      { name: 'Side Plank Pulses', desc: 'In side plank, dip hips slightly and press back up.', base: 20 },
      { name: 'Russian Twists', desc: 'Sit in V, twist torso side to side under control.', base: 20 },
      { name: 'Thread the Needle Plank', desc: 'In side plank, reach top arm under your ribs, then back up to sky.', base: 20 }
    ]},
    c_antirot: { cat: 'core', theme: 'theme-core', title: 'Anti-Rotation Core', type: 'reps_side', vars: [
      { name: 'Plank Shoulder Taps', desc: 'In plank, tap opposite shoulder. Do not let hips sway at all.', base: 8 },
      { name: 'Plank Reaches', desc: 'In plank, reach one arm straight out in front. Hold 1s, return.', base: 6 },
      { name: 'Plank Pull-Throughs', desc: 'In plank, grab a heavy item from outside left hand, drag to right side.', base: 6 },
      { name: 'Bear Crawl Steps', desc: 'Hover knees 1 inch off floor. Take a tiny step forward with opposite arm/leg.', base: 8 }
    ]},
    c_lsit: { cat: 'core', theme: 'theme-core', title: 'Compression & L-Sit', type: 'time', vars: [
      { name: 'Seated Pike Pulses', desc: 'Sit with legs straight. Hands by knees. Lean forward and lift legs off floor in pulses.', base: 15 },
      { name: 'Tuck L-Sit Prep', desc: 'Sit between two chairs. Press down, lift hips, keep knees tucked to chest.', base: 10 },
      { name: 'Single Leg L-Sit', desc: 'Supported on chairs. One leg tucked, one leg perfectly straight.', base: 10 },
      { name: 'Full L-Sit Attempt', desc: 'Supported on chairs/floor. Both legs perfectly straight, hips lifted. Hold.', base: 10 }
    ]},

    // === GLUTES & LEGS ===
    g_squat: { cat: 'glute', theme: 'theme-glute', title: 'Squat Pattern', type: 'reps', vars: [
      { name: 'Bodyweight Squat', desc: 'Sink hips down and back to knee level or lower. Drive up through heels.', base: 6 },
      { name: 'Pause Squats', desc: 'Hold the absolute bottom of the squat for 3 full seconds per rep.', base: 6 },
      { name: '1.5 Rep Squats', desc: 'Squat all the way down, come up halfway, go back down, stand all the way up.', base: 6 },
      { name: 'Jump Squats', desc: 'Explode up, land softly with bent knees.', base: 8 }
    ]},
    g_hinge: { cat: 'glute', theme: 'theme-glute', title: 'Hinge Pattern', type: 'reps', vars: [
      { name: 'Glute Bridge', desc: 'Press hips up from floor. Squeeze hard at the top.', base: 10 },
      { name: 'Single-Leg Bridge', desc: 'One leg extended straight out. Push with planted foot.', base: 8 },
      { name: 'Elevated Bridge', desc: 'Feet on a chair/couch, press hips up.', base: 10 },
      { name: 'Single-Leg Elevated', desc: 'One foot on chair, one extended. Max range of motion.', base: 8 }
    ]},
    g_abduct: { cat: 'glute', theme: 'theme-glute', title: 'Knee Stability', type: 'reps_side', vars: [
      { name: 'Clamshells', desc: 'Lie on side, knees bent/stacked. Keep feet glued and lift top knee like a clamshell.', base: 10 },
      { name: 'Fire Hydrants', desc: 'On all fours, lift one knee directly out to the side. Keep core still.', base: 10 },
      { name: 'Side-Lying Leg Raises', desc: 'Lie on side, legs straight. Lift top leg straight up, leading with the heel.', base: 10 },
      { name: 'Curtsy Lunges', desc: 'Step one leg behind and across the other, sinking into a lunge.', base: 8 }
    ]},
    g_ham: { cat: 'glute', theme: 'theme-glute', title: 'Hamstrings', type: 'reps', vars: [
      { name: 'Glute Bridge Walkouts', desc: 'Hold a bridge, walk heels out away from you until legs are almost straight, then walk back.', base: 5 },
      { name: 'Slider Leg Curls (Eccentric)', desc: 'Bridge up with feet on towels. Slowly slide feet out. Drop hips to pull back.', base: 6 },
      { name: 'Slider Leg Curls (Full)', desc: 'Bridge up. Slide feet out, then pull them back in while keeping hips elevated.', base: 6 },
      { name: 'Single-Leg RDL (Bodyweight)', desc: 'Hinge at hips, lifting one leg straight back behind you until torso is parallel to floor.', base: 8 }
    ]},
    g_lateral: { cat: 'glute', theme: 'theme-glute', title: 'Lateral Power', type: 'reps_side', vars: [
      { name: 'Lateral Weight Shifts', desc: 'Wide stance. Shift weight side to side, keeping chest up. Do not step.', base: 8 },
      { name: 'Side Lunges', desc: 'Step out wide to the side, sink hips down and back on that leg. Push back to center.', base: 6 },
      { name: 'Cossack Squats', desc: 'Very wide stance. Squat deep on one leg while the other leg stays straight, toes pointing up.', base: 5 },
      { name: 'Skater Jumps', desc: 'Leap side to side, landing on one foot and sweeping the other behind you.', base: 10 }
    ]},
    g_quad: { cat: 'glute', theme: 'theme-glute', title: 'Quad Isolation', type: 'reps', vars: [
      { name: 'Kneeling Lean Backs', desc: 'Kneel tall. Keep straight line from knees to head. Lean back slightly, return.', base: 8 },
      { name: 'Reverse Nordics (Assisted)', desc: 'Hold a band or doorframe. Lean back until calves touch hamstrings, pull back up.', base: 6 },
      { name: 'Full Reverse Nordics', desc: 'No assistance. Lean all the way back and drive through quads to return vertical.', base: 5 },
      { name: 'Sissy Squat Prep', desc: 'Hold a chair. Rise on toes, lean torso back, and drive knees far forward over toes.', base: 6 }
    ]},
    g_plyo: { cat: 'glute', theme: 'theme-glute', title: 'Plyometrics', type: 'reps', vars: [
      { name: 'Pogo Jumps', desc: 'Keep legs straight. Bounce on the balls of your feet like a pogo stick.', base: 20 },
      { name: 'Squat Jumps', desc: 'Squat down, explode up as high as possible. Soft landing.', base: 8 },
      { name: 'Broad Jumps', desc: 'Jump forward as far as possible. Turn around and repeat.', base: 6 },
      { name: 'Split Jumps', desc: 'Start in lunge. Jump and switch legs in the air, landing in lunge on the other side.', base: 12 }
    ]},

    // === UPPER BODY ===
    a_push: { cat: 'arm', theme: 'theme-arm', title: 'Horizontal Push', type: 'reps', vars: [
      { name: 'Incline Push-Up', desc: 'Hands on counter or sturdy chair.', base: 6 },
      { name: 'Standard Push-Up', desc: 'From the floor. Chest to deck.', base: 6 },
      { name: 'Push-Up with Rotation', desc: 'Do a push-up, then lift one arm to the sky into a T-plank.', base: 6 },
      { name: 'Decline Push-Up', desc: 'Feet elevated on chair, hands on floor.', base: 8 }
    ]},
    a_pull: { cat: 'arm', theme: 'theme-arm', title: 'Horizontal Pull', type: 'reps', vars: [
      { name: 'Prone Ts', desc: 'Lie on stomach, arms straight out, lift squeezing shoulder blades.', base: 10 },
      { name: 'Doorway Rows', desc: 'Hold doorframe, lean back, pull self in.', base: 12 },
      { name: 'Towel Slide Pulls', desc: 'Lie on smooth floor with towel under hands. Pull body forward.', base: 8 },

  function changeFocus(newFocus) {
    if(newFocus !== currentFocus) {
      if(confirm("Changing your phase focus will generate a new schedule for this week. Proceed?")) {
        currentFocus = newFocus;
        activeSchedule = generateSchedule(currentFocus);
        completedStats = {};
        activeSchedule.forEach((_, i) => completedStats[i] = new Set());
        currentDayIdx = 0;
        saveGame();
        refreshUI();
      } else {
        document.getElementById('focusSelect').value = currentFocus;
      }
    }
  }

  function getExerciseData(exId, weekNum) {
    const track = db[exId];
    if (!track) {
      console.error("Missing Database Track: " + exId);
      return {
        name: "Error: Missing Move", desc: "Database entry for " + exId + " is missing.", meta: "ERROR", xpReward: 0,
        timerVal: 0, levelNum: 1, isOverride: false, trackCat: 'stretch', trackTheme: 'theme-stretch', trackTitle: 'Error'
      };
    }

    const isStretch = track.cat === 'stretch';
    const phase = Math.ceil(weekNum / 4); 
    const subWeek = (weekNum - 1) % 4;    

    let defaultVarIdx = Math.min(phase - 1, 3); 
    let activeVarIdx = userOverrides[exId] !== undefined ? userOverrides[exId] : defaultVarIdx;
    const variation = track.vars[activeVarIdx];

    let sets = isStretch ? 1 : 2; 
    if (!isStretch && phase === 5) sets = 3;
    if (!isStretch && phase === 6) sets = 4;

    let val = variation.base;
    if (track.type.includes('time')) val += (subWeek * 5); 
    else val += (subWeek * 2);  

    let meta = '';
    if (track.type === 'time') meta = `⏱ ${sets}x${val}s`;
    if (track.type === 'time_side') meta = `⏱ ${sets}x${val}s / side`;
    if (track.type === 'reps') meta = `🔁 ${sets}x${val}`;
    if (track.type === 'reps_side') meta = `🔁 ${sets}x${val} / side`;

    const xpReward = Math.round((sets * val) / (track.type.includes('time') ? 4 : 1));

    return {
      name: variation.name, desc: variation.desc, meta: meta, xpReward: Math.max(10, xpReward),
      timerVal: track.type.includes('time') ? val : 0, levelNum: activeVarIdx + 1,
      isOverride: userOverrides[exId] !== undefined, trackCat: track.cat,
      trackTheme: track.theme, trackTitle: track.title
    };
  }

  function changeWeek(dir) { 
    const newWeek = currentWeek + dir;
    if (newWeek >= 1 && newWeek <= MAX_WEEKS) {
      currentWeek = newWeek;
      activeSchedule = generateSchedule(currentFocus); 
      completedStats = {};
      activeSchedule.forEach((_, i) => completedStats[i] = new Set());
      currentDayIdx = 0; 
      saveGame();
      refreshUI();
    }
  }

  function selectDay(index) {
    currentDayIdx = index;

  function toggleLevel(exId) {
    let current = userOverrides[exId] !== undefined ? userOverrides[exId] : Math.min(Math.ceil(currentWeek/4) - 1, 3);
    userOverrides[exId] = current === 3 ? 0 : current + 1;
    saveGame();
    renderWorkout();
  }

  function swapExercise(dayIdx, exIdx, category) {
    const dayData = activeSchedule[dayIdx];
    const currentId = dayData.ids[exIdx];
    const pool = pools[category];
    
    let poolIdx = pool.indexOf(currentId);
    let nextId = pool[(poolIdx + 1) % pool.length];

    while (dayData.ids.includes(nextId) && pool.length > dayData.ids.length) {
      poolIdx = (poolIdx + 1) % pool.length;
      nextId = pool[poolIdx];
    }

    if (completedStats[dayIdx].has(currentId)) {
      completedStats[dayIdx].delete(currentId);
      const oldData = getExerciseData(currentId, currentWeek);
      removeXP(oldData.trackCat, oldData.xpReward);
    }
    dayData.ids[exIdx] = nextId;
    saveGame();
    renderWorkout();
    checkBanner();
  }

  function toggleCheck(e, exId, cat, xp) {
    e.stopPropagation();
    const checkedSet = completedStats[currentDayIdx];
    
    if (checkedSet.has(exId)) {
      checkedSet.delete(exId);
      document.getElementById('chk-' + exId).classList.remove('checked');
      document.getElementById('card-' + exId).classList.remove('completed');
      removeXP(cat, xp);
    } else {
      checkedSet.add(exId);
      document.getElementById('chk-' + exId).classList.add('checked');
      document.getElementById('card-' + exId).classList.add('completed');
      addXP(cat, xp);

  function checkBanner() {
    const totalToday = activeSchedule[currentDayIdx].ids.length;
    const completedToday = completedStats[currentDayIdx].size;
    document.getElementById('doneBanner').style.display = (completedToday === totalToday && totalToday > 0) ? 'block' : 'none';
  }

  const CIRCUMFERENCE = 163.36; 
  function fmtTime(s) { return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }

  function startTimer(id, total) {
    if (timers[id] && timers[id].running) return;
    const display = document.getElementById('timerDisplay-' + id);
    const ring = document.getElementById('ring-' + id);
    if (!ring) return;

    let remaining = timers[id] ? timers[id].remaining : total;
    ring.style.strokeDasharray = CIRCUMFERENCE;
    timers[id] = { running: true, remaining };

    const interval = setInterval(() => {
      remaining--;
      timers[id].remaining = remaining;
      display.textContent = fmtTime(remaining);
      ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - remaining / total);

      if (remaining <= 0) {
        clearInterval(interval);
        timers[id].running = false;
        display.textContent = '✓';
      }
    }, 1000);
    timers[id].interval = interval;
  }

  function resetTimer(id, total) {
    if (timers[id] && timers[id].interval) clearInterval(timers[id].interval);
    timers[id] = { running: false, remaining: total };
    const display = document.getElementById('timerDisplay-' + id);
    const ring = document.getElementById('ring-' + id);
    if (display) display.textContent = fmtTime(total);
    if (ring) ring.style.strokeDashoffset = CIRCUMFERENCE;
  }

    const phase = Math.ceil(currentWeek / 4);
    const subWeek = ((currentWeek - 1) % 4) + 1;
    document.getElementById('phaseName').textContent = `Phase ${phase} (Month ${phase})`;
    document.getElementById('phaseFocus').textContent = phase < 5 ? `Week ${subWeek}/4: Volume Loading` : `Week ${subWeek}/4: Set Multiplication`;
    
    updateStatUI();
    Object.keys(timers).forEach(id => { if(timers[id].interval) clearInterval(timers[id].interval); });
    renderSchedule();
    renderWorkout();
    checkBanner();
  }

  function boot() {
    if (!loadGame()) {
      currentWeek = 1; currentDayIdx = 0; currentFocus = 'balanced';
      activeSchedule = generateSchedule(currentFocus);
      completedStats = {};
      activeSchedule.forEach((_, i) => completedStats[i] = new Set());
      saveGame();
    }
    refreshUI();
  }

  boot();
</script>
</body>
</html>
